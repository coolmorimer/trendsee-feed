# Docker-оркестрация: postgres + redis + backend + frontend(nginx)
# Всё поднимается одной командой: docker-compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trendsee
      POSTGRES_PASSWORD: trendsee
      POSTGRES_DB: trendsee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendsee"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: trendsee
      POSTGRES_PASSWORD: trendsee
      POSTGRES_DB: trendsee
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-production
      CACHE_TTL: 600
      SLOW_DB_DELAY: 2.0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80","http://localhost"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
